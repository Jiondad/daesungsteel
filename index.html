  <!-- React Code inside Babel Script -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- EMISSION FACTOR CONSTANTS ---
    const EMISSION_FACTORS = {
      diesel: 0.0025822,      // tCO2e / L
      cityGas: 0.0021952,     // tCO2e / Nm³
      electricity: 0.0004687, // tCO2e / kWh
      water: 0.000237,        // tCO2e / TON
    };

    const TARGETS_2026 = [
      { diesel: 99, cityGas: 7565, electricity: 93242, water: 277 },
      { diesel: 530, cityGas: 9173, electricity: 94822, water: 419 },
      { diesel: 441, cityGas: 9065, electricity: 88970, water: 397 },
      { diesel: 691, cityGas: 5982, electricity: 83787, water: 366 },
      { diesel: 452, cityGas: 1860, electricity: 68539, water: 238 },
      { diesel: 487, cityGas: 941, electricity: 70912, water: 226 },
      { diesel: 684, cityGas: 537, electricity: 84655, water: 260 },
      { diesel: 638, cityGas: 425, electricity: 79401, water: 234 },
      { diesel: 582, cityGas: 369, electricity: 87577, water: 254 },
      { diesel: 582, cityGas: 739, electricity: 70004, water: 247 },
      { diesel: 532, cityGas: 1517, electricity: 82935, water: 238 },
      { diesel: 1094, cityGas: 3387, electricity: 100981, water: 240 },
    ];

    const ROADMAP_TARGETS = [
      { year: 2025, target: 579.116, scope1: 92.720, scope2: 486.396, label: "기준(2025)" },
      { year: 2026, target: 568.698, scope1: 106.622, scope2: 462.076, label: "2026목표" },
      { year: 2027, target: 542.395, label: "2027목표" },
      { year: 2028, target: 517.345, label: "2028목표" },
      { year: 2029, target: 493.483, label: "2029목표" },
      { year: 2030, target: 470.756, label: "2030목표" },
    ];

    function calculateEmissions(diesel, cityGas, electricity) {
      const s1Diesel = (diesel || 0) * EMISSION_FACTORS.diesel;
      const s1Gas = (cityGas || 0) * EMISSION_FACTORS.cityGas;
      const s2Elec = (electricity || 0) * EMISSION_FACTORS.electricity;
      return {
        scope1: s1Diesel + s1Gas,
        scope2: s2Elec,
        total: s1Diesel + s1Gas + s2Elec,
      };
    }

    // --- HELPER FOR NUMBER FORMATTING ---
    const formatVal = (val, decimals = 2) => {
      if (val === undefined || val === null || isNaN(val)) {
        return (0).toFixed(decimals);
      }
      return Number(Number(val).toFixed(decimals)).toLocaleString(undefined, {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    };

    // --- REUSABLE SVG ICON COMPONENT ---

        trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,

        zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
        droplet: <path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-13-7-13S5 10.7 5 15a7 7 0 0 0 7 7z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
        info: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></g>,
        coins: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"/><circle cx="18" cy="18" r="4"/><path d="M12 18a6 6 0 0 0-6-6M18 12a4 4 0 0 0-4-4"/></g>,
        layers: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polygon points="2 17 12 22 22 17"/><polygon points="2 12 12 17 22 12"/></g>,
        chevron: <polyline points="9 18 15 12 9 6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
        database: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></g>,
        print: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></g>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" className={className}>
          {icons[name] || <circle cx="12" cy="12" r="10" />}
        </svg>
      );
    };

    // --- CHART COMPONENTS USING RAW CHART.JS CANVAS ---
    const MonthlyEmissionsChart = ({ data }) => {
      const canvasRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');

        // 은은한 그라디언트 생성
        const scope1Grad = ctx.createLinearGradient(0, 0, 0, 300);
        scope1Grad.addColorStop(0, '#14B8A6'); // Mint Teal
        scope1Grad.addColorStop(1, '#0F766E'); // Deep Teal

        const scope2Grad = ctx.createLinearGradient(0, 0, 0, 300);
        scope2Grad.addColorStop(0, '#60A5FA'); // Light Slate Blue
        scope2Grad.addColorStop(1, '#1E3A8A'); // Slate Blue / Navy

        chartInstance.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: data.map(d => `${d.month}월`),
            datasets: [
              {
                label: '실제 Scope 1',
                data: data.map(d => d.scope1),
                backgroundColor: scope1Grad,
                stack: 'actual',
                borderRadius: 4,
                order: 2
              },
              {
                label: '실제 Scope 2',
                data: data.map(d => d.scope2),
                backgroundColor: scope2Grad,
                stack: 'actual',
                borderRadius: 4,
                order: 2
              },
              {
                label: '목표 배출량 (t)',
                data: data.map(d => d.target),
                borderColor: '#DC2626',
                borderWidth: 3,
                type: 'line',
                fill: false,
                tension: 0.15,
                pointBackgroundColor: '#FFFFFF',
                pointBorderColor: '#DC2626',
                pointBorderWidth: 2.5,
                pointRadius: 5,
                pointHoverRadius: 7,
                order: 1
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: false
              },
              tooltip: {
                backgroundColor: '#1C1A17',
                titleFont: { family: 'Noto Sans KR', size: 12, weight: 'bold' },
                bodyFont: { family: 'Noto Sans KR', size: 11 },
                padding: 10,
                cornerRadius: 4,
                displayColors: true,
                callbacks: {
                  label: function(context) {
                    return ` ${context.dataset.label}: ${formatVal(context.raw, 2)} t`;
                  }
                }
              }
            },
            scales: {
              x: {
                stacked: true,
                grid: {
                  color: '#FAF9F6',
                  borderDash: [4, 4],
                  drawTicks: false
                },

                  font: { family: 'Noto Sans KR', size: 11 }
                },
                border: { display: false }
              },
              y: {

                grid: {
                  color: '#EAE6DD',
                  borderDash: [4, 4],
                  drawTicks: false

                ticks: {

                border: { display: false }

            }
          }

        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
        };
      }, [data]);

      return <div className="h-80 w-full"><canvas ref={canvasRef} /></div>;
    };

    const RevenueIntensityChart = ({ data }) => {
      const canvasRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');

        // 매출액 은은한 그라디언트
        const revGrad = ctx.createLinearGradient(0, 0, 0, 300);
        revGrad.addColorStop(0, '#F5F5F4'); // warm light gray
        revGrad.addColorStop(1, '#D6D3D1'); // stone 300

        chartInstance.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: data.map(d => `${d.month}월`),
            datasets: [
              {
                label: '월별 매출액 (억원)',
                data: data.map(d => d.revenue),
                backgroundColor: revGrad,
                borderRadius: 4,
                yAxisID: 'y',
                order: 2
              },
              {
                label: '배출 원단위 (t/억원)',

                borderColor: '#10B981',
                borderWidth: 3,
                type: 'line',
                fill: false,
                tension: 0.15,
                pointBackgroundColor: '#FFFFFF',
                pointBorderColor: '#10B981',
                pointBorderWidth: 2.5,
                pointRadius: 5,
                pointHoverRadius: 7,
                yAxisID: 'y1',
                order: 1
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {

              tooltip: {
                backgroundColor: '#1C1A17',

                bodyFont: { family: 'Noto Sans KR', size: 11 },

            scales: {

                },
                border: { display: false }
              },
              y: {

                },

                border: { display: false }
              }
            }
          }
        });

        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
        };
      }, [data]);

      return <div className="h-80 w-full"><canvas ref={canvasRef} /></div>;
    };

    const RoadmapSimulatorChart = ({ data }) => {
      const canvasRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartInstance.current) {

        const ctx = canvasRef.current.getContext('2d');
        chartInstance.current = new Chart(ctx, {

              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1C1A17',
                titleFont: { family: 'Noto Sans KR', size: 12, weight: 'bold' },
                bodyFont: { family: 'Noto Sans KR', size: 11 },
                padding: 10,
                cornerRadius: 4,
                displayColors: true,
                callbacks: {
                  label: function(context) {
                    return ` ${context.dataset.label}: ${formatVal(context.raw, 2)} t`;
                  }
                }
              }
            },
            scales: {
              x: {
                grid: {
                  color: '#FAF9F6',
                  borderDash: [4, 4],
                  drawTicks: false

                  font: { family: 'Noto Sans KR', size: 11 }
                },
                border: { display: false }

              y: {
                min: 400,
                max: 600,
                grid: {
                  color: '#EAE6DD',
                  borderDash: [4, 4],
                  drawTicks: false
                },
                ticks: {
                  font: { family: 'JetBrains Mono', size: 11 }
                },
                title: { display: true, text: 'tCO₂e', font: { family: 'Noto Sans KR', size: 11 } },
                border: { display: false }
              }
            }
          }

        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
        };
      }, [data]);

      return <div className="h-80 w-full"><canvas ref={canvasRef} /></div>;
    };

    // --- COOPERATIVE ACHIEVEMENT DOUGHNUT CHART ---
    const AchievementDoughnutChart = ({ actual, target }) => {
      const canvasRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');
        const rate = target > 0 ? (actual / target) * 100 : 0;

        // 은은하고 현대적인 그라디언트 설정
        const donutGrad = ctx.createLinearGradient(0, 0, 0, 150);
        donutGrad.addColorStop(0, '#10B981'); // Emerald Mint
        donutGrad.addColorStop(1, '#059669'); // Dark Green Mint

        chartInstance.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['소진율', '잔여한도'],
            datasets: [{
              data: [Math.min(rate, 100), Math.max(0, 100 - rate)],
              backgroundColor: [donutGrad, '#EAE6DD'],
              borderWidth: 0,
              hoverOffset: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '72%',
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false }
            }
          }
        });

        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
        };
      }, [actual, target]);

      const rate = target > 0 ? (actual / target) * 100 : 0;

      return (
        <div className="relative w-40 h-40 mx-auto">
          <canvas ref={canvasRef} />
          <div className="absolute inset-0 flex flex-col items-center justify-center text-center pointer-events-none">
            <span className="text-2xl font-black text-[#1C1A17] font-mono leading-none">{rate.toFixed(1)}%</span>
            <span className="text-[10px] text-[#78716C] font-bold uppercase tracking-wider mt-1.5">of target</span>
          </div>
        </div>
      );
    };


    // --- MAIN DASHBOARD COMPONENT ---
    const Dashboard = ({ records, targets = {}, onNavigateToEntry }) => {
      const [selectedYear, setSelectedYear] = useState(2026);
      const [fromMonth, setFromMonth] = useState(1);
      const [toMonth, setToMonth] = useState(6);
      const [printDate, setPrintDate] = useState('');
      const [showPrintNotice, setShowPrintNotice] = useState(false);

      const isIframe = useMemo(() => {
        try {
          return window.self !== window.top;
        } catch (e) {
          return true;
        }
      }, []);

      const handlePrint = () => {
        // Always try to invoke window.print()
        try {
          window.print();
        } catch (error) {
          console.error("Print invocation failed:", error);
        }
        
        // Show guidance notice if inside iframe where print might be blocked or fails to open
        if (isIframe) {
          setShowPrintNotice(true);
        }
      };

      useEffect(() => {
        const updateDate = () => {
          const now = new Date();
          const yr = now.getFullYear();
          const mt = String(now.getMonth() + 1).padStart(2, '0');
          const dy = String(now.getDate()).padStart(2, '0');
          const hr = String(now.getHours()).padStart(2, '0');
          const mn = String(now.getMinutes()).padStart(2, '0');
          const sc = String(now.getSeconds()).padStart(2, '0');
          setPrintDate(`${yr}-${mt}-${dy} ${hr}:${mn}:${sc}`);
        };
        updateDate();
        window.addEventListener('beforeprint', updateDate);
        return () => window.removeEventListener('beforeprint', updateDate);
      }, []);

      const yearTargets = useMemo(() => {
        return targets[selectedYear] || TARGETS_2026;
      }, [targets, selectedYear]);

      const handleFromMonthChange = (e) => {
        const val = Number(e.target.value);
        setFromMonth(val);
        if (val > toMonth) {
          setToMonth(val);
        }
      };

      const handleToMonthChange = (e) => {
        const val = Number(e.target.value);
        if (val < fromMonth) {
          setFromMonth(val);
        }
        setToMonth(val);
      };

      const yearRecords = useMemo(() => records.filter(r => r.year === selectedYear), [records, selectedYear]);

      // Calculate period-specific stats (fromMonth to toMonth)
      const periodStats = useMemo(() => {
        let actualDiesel = 0;
        let actualCityGas = 0;
        let actualElectricity = 0;
        let actualWater = 0;
        let actualRevenue = 0;

        let targetDiesel = 0;
        let targetCityGas = 0;
        let targetElectricity = 0;
        let targetWater = 0;

        let activeMonthsCount = 0;
        const activeMonthsList = [];

        for (let m = fromMonth; m <= toMonth; m++) {
          const target = yearTargets[m - 1] || yearTargets[0] || TARGETS_2026[0];
          const record = yearRecords.find(r => r.month === m);

          // Sum target values for the selected months (to provide period aggregate guideline)
          targetDiesel += target.diesel || 0;
          targetCityGas += target.cityGas || 0;
          targetElectricity += target.electricity || 0;
          targetWater += target.water || 0;

          if (record) {
            actualDiesel += record.diesel || 0;
            actualCityGas += record.cityGas || 0;
            actualElectricity += record.electricity || 0;
            actualWater += record.water || 0;
            actualRevenue += record.revenue || 0;

            activeMonthsCount++;
            activeMonthsList.push(m);
          }
        }

        const actualEm = calculateEmissions(actualDiesel, actualCityGas, actualElectricity);
        const targetEm = calculateEmissions(targetDiesel, targetCityGas, targetElectricity);

        return {
          actualDiesel,
          actualCityGas,
          actualElectricity,
          actualWater,
          actualRevenue,
          targetDiesel,
          targetCityGas,
          targetElectricity,
          targetWater,
          actualScope1: actualEm.scope1,
          actualScope2: actualEm.scope2,
          actualTotal: actualEm.total,
          targetScope1: targetEm.scope1,
          targetScope2: targetEm.scope2,
          targetTotal: targetEm.total,
          activeMonthsCount,
          activeMonthsList,
          intensity: actualRevenue > 0 ? (actualEm.total / actualRevenue) : 0
        };
      }, [yearRecords, fromMonth, toMonth, yearTargets]);

      // Yearly stats (1 to 12) for the table footer
      const yearStats = useMemo(() => {
        let diesel = 0;
        let cityGas = 0;
        let electricity = 0;
        let water = 0;
        let revenue = 0;
        let activeMonths = 0;

        for (let m = 1; m <= 12; m++) {
          const r = yearRecords.find(rec => rec.month === m);
          if (r) {
            diesel += r.diesel || 0;
            cityGas += r.cityGas || 0;
            electricity += r.electricity || 0;
            water += r.water || 0;
            revenue += r.revenue || 0;
            activeMonths++;
          }
        }

        const em = calculateEmissions(diesel, cityGas, electricity);
        return {
          diesel,
          cityGas,
          electricity,
          water,
          revenue,
          emissions: em.total,
          intensity: revenue > 0 ? (em.total / revenue) : 0,
          activeMonths
        };
      }, [yearRecords]);

      // Primary Mixed Graph Data (fromMonth to toMonth)
      const chartData1 = useMemo(() => {
        const data = [];
        for (let m = fromMonth; m <= toMonth; m++) {
          const target = yearTargets[m - 1] || yearTargets[0] || TARGETS_2026[0];
          const record = yearRecords.find(r => r.month === m);

          const targetEm = calculateEmissions(target.diesel, target.cityGas, target.electricity);
          const actualEm = record ? calculateEmissions(record.diesel, record.cityGas, record.electricity) : null;

          data.push({
            month: m,
            scope1: actualEm ? actualEm.scope1 : 0,
            scope2: actualEm ? actualEm.scope2 : 0,
            target: targetEm.total,
          });
        }
        return data;
      }, [yearRecords, fromMonth, toMonth, yearTargets]);

      // Revenue & Intensity Graph Data (fromMonth to toMonth)
      const chartData2 = useMemo(() => {
        const data = [];
        for (let m = fromMonth; m <= toMonth; m++) {
          const record = yearRecords.find(r => r.month === m);
          const actualEm = record ? calculateEmissions(record.diesel, record.cityGas, record.electricity) : null;
          const revenue = record && record.revenue !== undefined ? record.revenue : null;
          const intensity = record && record.revenue > 0 && actualEm ? (actualEm.total / record.revenue) : null;

          data.push({
            month: m,
            revenue: revenue,
            intensity: intensity,
          });
        }
        return data;
      }, [yearRecords, fromMonth, toMonth]);

      const renderMetricRow = (label, icon, value, target, unit, factor) => {
        const isExceeded = value > target;
        return (
          <div className="bg-[#FAF9F6] border border-[#1C1A17]/15 p-4 sm:p-5 hover:border-[#1C1A17]/40 shadow-sm">
            <div className="flex flex-col justify-start items-start gap-1.5 mb-4">
              <div className="flex items-center gap-2.5 w-full">
                <div className="p-2 bg-[#1C1A17] text-[#FAF9F6] shrink-0">
                  {icon}
                </div>
                <div className="min-w-0">
                  <span className="text-[#1C1A17] font-semibold text-[13px] sm:text-sm block whitespace-nowrap">{label}</span>
                  <span className="text-[10px] text-[#78716C] font-mono block whitespace-nowrap">계수: {factor.toFixed(7)} tCO₂e/{unit}</span>
                </div>
              </div>
              {periodStats.activeMonthsCount > 0 ? (
                <span className={`px-2.5 py-1 text-[10px] font-mono font-bold tracking-wider uppercase border whitespace-nowrap mt-1 ${
                  isExceeded 
                    ? 'bg-[#FEF2F2] text-[#991B1B] border-[#FCA5A5]' 
                    : 'bg-[#F0FDF4] text-[#166534] border-[#86EFAC]'
                }`}>
                  {isExceeded ? '목표 초과' : '목표 달성'}
                </span>
              ) : (
                <span className="px-2.5 py-1 text-[10px] font-mono font-bold tracking-wider uppercase border whitespace-nowrap mt-1 bg-gray-100 text-gray-500 border-gray-300">
                  데이터 없음
                </span>
              )}
            </div>

            <div className="space-y-2 font-mono text-xs mt-3">
              <div className="flex justify-between items-center text-[#57534E]">
                <span>실제 사용량:</span>
                <span className="font-bold text-[#1C1A17]">{value !== undefined ? formatVal(value, 2) : '0.00'} {unit}</span>
              </div>
              <div className="flex justify-between items-center text-[#78716C]">
                <span>기준 목표치:</span>
                <span>{formatVal(target, 2)} {unit}</span>
              </div>
              <div className="flex justify-between items-center text-[#57534E] border-t border-[#1C1A17]/10 pt-2 text-[11px]">
                <span className="font-medium">환산 배출량:</span>
                <span className="font-bold text-[#1C1A17]">{formatVal(value * factor, 2)} tCO₂e</span>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="space-y-8 font-sans">
          {/* Print Official Header (Only visible when printing / PDF generation) */}
          <div className="hidden print:block border-b-4 border-[#1C1A17] pb-5 mb-8">
            <div className="flex justify-between items-end">
              <div>
                <span className="text-[10px] text-[#78716C] font-mono tracking-widest block uppercase font-bold">CONFIDENTIAL — GHG EMISSIONS STANDARD REPORT</span>
                <h1 className="text-3xl font-extrabold tracking-tight text-[#1C1A17] font-display mt-1">
                  (주)대성스틸 온실가스 인벤토리 공식 보고서
                </h1>
                <p className="text-xs text-[#57534E] font-mono mt-1">
                  OFFICIAL GREENHOUSE GAS EMISSIONS STATEMENT & INVENTORY RECORD
                </p>
              </div>
              <div className="text-right">
                <div className="w-14 h-14 bg-[#1C1A17] text-[#FAF9F6] flex items-center justify-center font-bold text-lg ml-auto mb-1">DS</div>
                <span className="text-[10px] text-[#78716C] font-semibold block">(주)대성스틸 안전환경본부</span>
              </div>
            </div>

            <div className="grid grid-cols-4 gap-4 mt-6 border-t border-[#1C1A17]/20 pt-4 text-[11px] font-sans">
              <div className="border border-[#1C1A17]/10 p-2 bg-[#FAF9F6]/50">
                <span className="text-[#78716C] block uppercase font-mono text-[9px] tracking-wider font-semibold">보고 연도</span>
                <strong className="text-[#1C1A17] text-xs font-mono">{selectedYear}년도</strong>

              <div className="border border-[#1C1A17]/10 p-2 bg-[#FAF9F6]/50">

                <strong className="text-[#1C1A17] text-xs font-mono">{fromMonth}월 ~ {toMonth}월 (누적)</strong>
              </div>
              <div className="border border-[#1C1A17]/10 p-2 bg-[#FAF9F6]/50">
                <span className="text-[#78716C] block uppercase font-mono text-[9px] tracking-wider font-semibold">검증 검인 표준</span>
                <strong className="text-[#1C1A17] text-xs">IPCC / 국가 배출 계수 기준</strong>
              </div>
              <div className="border border-[#1C1A17]/10 p-2 bg-[#FAF9F6]/50">
                <span className="text-[#78716C] block uppercase font-mono text-[9px] tracking-wider font-semibold">문서 관리 코드</span>
                <strong className="text-[#1C1A17] text-xs font-mono">DS-GHG-{selectedYear}-{String(fromMonth).padStart(2,'0')}{String(toMonth).padStart(2,'0')}</strong>
              </div>
            </div>
          </div>

          {/* Controls */}
          <div className="flex flex-wrap items-center justify-between gap-4 bg-white border border-[#1C1A17]/15 p-4 sm:p-5 shadow-sm print:hidden">

              <div className="p-2 bg-[#1C1A17] text-white">
                <Icon name="dashboard" className="w-5 h-5" />
              </div>
              <div>
                <h2 className="text-base sm:text-lg font-bold text-[#1C1A17] font-display">종합 실적 모니터링 대시보드</h2>
                <p className="text-[11px] sm:text-xs text-[#57534E]">지정된 시작월 ~ 종료월 기간의 탄소 집약도 배출 성과 실적</p>
              </div>
            </div>

            <div className="flex flex-wrap items-center gap-3">
              <select
                value={selectedYear}
                onChange={(e) => setSelectedYear(Number(e.target.value))}
                className="h-9 bg-[#FAF9F6] border border-[#E5E2D9] px-3 text-xs sm:text-sm font-mono cursor-pointer focus:outline-none focus:border-[#1C1A17]"
              >
                <option value={2026}>2026년</option>
                <option value={2025}>2025년</option>
                <option value={2024}>2024년</option>
              </select>
              
              <div className="flex items-center gap-1.5 bg-[#FAF9F6] border border-[#E5E2D9] px-2.5 h-9 text-xs sm:text-sm">
                <span className="text-[#78716C] font-semibold text-[11px] mr-1 uppercase">시작</span>
                <select
                  value={fromMonth}
                  onChange={handleFromMonthChange}
                  className="bg-transparent font-mono cursor-pointer focus:outline-none"
                >
                  {Array.from({ length: 12 }, (_, i) => (
                    <option key={i + 1} value={i + 1}>{i + 1}월</option>
                  ))}
                </select>
                <span className="text-[#78716C] px-1 font-semibold">~</span>
                <span className="text-[#78716C] font-semibold text-[11px] mr-1 uppercase">종료</span>
                <select
                  value={toMonth}
                  onChange={handleToMonthChange}
                  className="bg-transparent font-mono cursor-pointer focus:outline-none"
                >
                  {Array.from({ length: 12 }, (_, i) => (
                    <option key={i + 1} value={i + 1}>{i + 1}월</option>
                  ))}
                </select>
              </div>

              {/* Report Print Button */}
              <button
                onClick={handlePrint}
                className="flex items-center gap-1.5 h-9 px-3 bg-[#15803D] hover:bg-[#166534] text-white text-xs sm:text-sm font-bold transition-all cursor-pointer shadow-sm border border-[#15803D]/10 rounded-none shrink-0"
                title="공식 온실가스 인벤토리 보고서 출력 및 PDF 저장"
              >
                <Icon name="print" className="w-3.5 h-3.5" />
                <span>보고서 출력</span>
              </button>
            </div>
          </div>

          {/* Quick Stats Grid */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 bg-white border border-[#1C1A17]/15 p-6 shadow-sm space-y-5 print-avoid-break">
              <h3 className="text-base font-bold text-[#1C1A17] uppercase tracking-wider font-display border-b border-[#FAF9F6] pb-3">
                {selectedYear}년 {fromMonth}월 ~ {toMonth}월 누적 탄소 명세서 (Carbon Statement)
              </h3>

              {periodStats.activeMonthsCount > 0 ? (
                <div className="space-y-6">
                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 font-mono">
                    <div className="bg-[#FAF9F6] p-4 border border-[#1C1A17]/10">
                      <span className="text-[10px] text-[#78716C] uppercase tracking-wider block font-semibold">선택 기간 총 배출량</span>
                      <span className="text-xl sm:text-2xl font-bold text-[#1C1A17]">{formatVal(periodStats.actualTotal, 2)}</span>
                      <span className="text-xs text-[#57534E] ml-1">t</span>
                    </div>
                    <div className="bg-[#FAF9F6] p-4 border border-[#1C1A17]/10">
                      <span className="text-[10px] text-[#78716C] uppercase tracking-wider block font-semibold">Scope 1 (직접)</span>
                      <span className="text-lg sm:text-xl font-bold text-[#B45309]">{formatVal(periodStats.actualScope1, 2)}</span>
                      <span className="text-xs text-[#78716C] ml-0.5">t</span>
                    </div>
                    <div className="bg-[#FAF9F6] p-4 border border-[#1C1A17]/10">
                      <span className="text-[10px] text-[#78716C] uppercase tracking-wider block font-semibold">Scope 2 (간접)</span>
                      <span className="text-lg sm:text-xl font-bold text-[#1E40AF]">{formatVal(periodStats.actualScope2, 2)}</span>
                      <span className="text-xs text-[#78716C] ml-0.5">t</span>
                    </div>
                    <div className="bg-[#FAF9F6] p-4 border border-[#1C1A17]/10">
                      <span className="text-[10px] text-[#78716C] uppercase tracking-wider block font-semibold">목표 대비 성과</span>
                      <span className={`text-lg sm:text-xl font-bold block ${periodStats.targetTotal - periodStats.actualTotal >= 0 ? 'text-[#15803D]' : 'text-[#991B1B]'}`}>
                        {periodStats.targetTotal - periodStats.actualTotal >= 0 
                          ? `▼ ${formatVal(periodStats.targetTotal - periodStats.actualTotal, 2)} t` 
                          : `▲ ${formatVal(Math.abs(periodStats.targetTotal - periodStats.actualTotal), 2)} t`
                        }
                      </span>
                      <span className="text-[10px] text-[#57534E] block font-sans font-semibold">
                        {periodStats.targetTotal - periodStats.actualTotal >= 0 
                          ? `달성률: ${formatVal((periodStats.targetTotal > 0 ? (periodStats.actualTotal / periodStats.targetTotal) * 100 : 0), 1)}%` 
                          : `초과율: ${formatVal((periodStats.targetTotal > 0 ? (periodStats.actualTotal / periodStats.targetTotal) * 100 : 0), 1)}%`
                        }
                      </span>
                    </div>
                  </div>

                  <div className="p-4 border border-dashed border-[#E5E2D9] text-xs leading-relaxed flex items-start gap-2.5 bg-[#FCFAF7] print-avoid-break">
                    <Icon name="info" className="w-5 h-5 text-[#78716C] shrink-0 mt-0.5" />
                    <div>
                      <span className="font-bold text-[#1C1A17] block">지정 기간 종합 분석 결과</span>
                      <p className="text-[#57534E] mt-1">
                        {periodStats.actualTotal > periodStats.targetTotal ? (
                          <span className="text-[#991B1B] font-semibold">✖ 선택 기간({fromMonth}월~{toMonth}월)의 배출량 총합({formatVal(periodStats.actualTotal, 2)} t)이 기준 목표치({formatVal(periodStats.targetTotal, 2)} t)를 초과하였습니다. 효율 조치 및 감축 노력이 강력히 요구됩니다.</span>
                        ) : (
                          <span className="text-[#15803D] font-semibold">✔ 선택 기간({fromMonth}월~{toMonth}월)의 온실가스 실제 배출 총합({formatVal(periodStats.actualTotal, 2)} t)이 목표 가이드라인({formatVal(periodStats.targetTotal, 2)} t) 내에서 안정적으로 유지 및 통제되고 있습니다.</span>
                        )}
                      </p>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="py-12 text-center bg-[#FAF9F6] border border-dashed border-[#E5E2D9] flex flex-col items-center justify-center space-y-4">
                  <Icon name="alert" className="w-8 h-8 text-[#78716C]" />

              <div className="absolute top-0 left-0 w-1.5 h-full bg-[#15803D]" />

                <div className="flex items-center gap-1.5 text-xs text-[#15803D] font-mono font-semibold uppercase tracking-widest">
                  <Icon name="layers" className="w-3.5 h-3.5" />
                  Period Cumulative Target
                </div>
                <h3 className="text-sm sm:text-base font-bold text-[#1C1A17] whitespace-nowrap">
                  {selectedYear}년 {fromMonth}월 ~ {toMonth}월 누적 실적 및 매칭률
                </h3>

                <div className="space-y-5 py-2">
                  <div className="flex flex-col justify-start items-start gap-1">
                    <span className="text-xs text-[#57534E] font-medium whitespace-nowrap">지정 기간 누적 총 배출량 (Scope 1+2)</span>
