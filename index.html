    const ROADMAP_TARGETS = [
      { year: 2025, target: 579.116, scope1: 92.720, scope2: 486.396, label: "기준(2025)" },
      { year: 2026, target: 568.698, scope1: 106.622, scope2: 462.076, label: "2026목표" },

    function calculateEmissions(diesel, cityGas, electricity) {
      const s1Diesel = (diesel || 0) * EMISSION_FACTORS.diesel;
      const s1Gas = (cityGas || 0) * EMISSION_FACTORS.cityGas;
      const s2Elec = (electricity || 0) * EMISSION_FACTORS.electricity;
      return {
        scope1: s1Diesel + s1Gas,
        scope2: s2Elec,
        total: s1Diesel + s1Gas + s2Elec,
      };
    }

    // --- HELPER FOR NUMBER FORMATTING ---
    const formatVal = (val, decimals = 2) => {
      if (val === undefined || val === null || isNaN(val)) {
        return (0).toFixed(decimals);
      }
      return Number(Number(val).toFixed(decimals)).toLocaleString(undefined, {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals

    };

    };

    // --- CHART COMPONENTS USING RAW CHART.JS CANVAS ---
    const MonthlyEmissionsChart = ({ data }) => {
      const canvasRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');

        // 은은한 그라디언트 생성

    // --- COOPERATIVE ACHIEVEMENT DOUGHNUT CHART ---
    const AchievementDoughnutChart = ({ actual, target }) => {
      const canvasRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');
        const rate = target > 0 ? (actual / target) * 100 : 0;

        // 은은하고 현대적인 그라디언트 설정
        const donutGrad = ctx.createLinearGradient(0, 0, 0, 150);
        donutGrad.addColorStop(0, '#10B981'); // Emerald Mint
        donutGrad.addColorStop(1, '#059669'); // Dark Green Mint

        chartInstance.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['소진율', '잔여한도'],
            datasets: [{
              data: [Math.min(rate, 100), Math.max(0, 100 - rate)],
              backgroundColor: [donutGrad, '#EAE6DD'],
              borderWidth: 0,
              hoverOffset: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '72%',
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false }
            }
          }
        });

        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
        };
      }, [actual, target]);

      const rate = target > 0 ? (actual / target) * 100 : 0;

      return (
        <div className="relative w-40 h-40 mx-auto">
          <canvas ref={canvasRef} />
          <div className="absolute inset-0 flex flex-col items-center justify-center text-center pointer-events-none">
            <span className="text-2xl font-black text-[#1C1A17] font-mono leading-none">{rate.toFixed(1)}%</span>
            <span className="text-[10px] text-[#78716C] font-bold uppercase tracking-wider mt-1.5">of target</span>
          </div>
        </div>
      );
    };


    // --- MAIN DASHBOARD COMPONENT ---
    const Dashboard = ({ records, targets = {}, onNavigateToEntry, onRefresh, availableYears = [2026, 2025, 2024] }) => {
      const [selectedYear, setSelectedYear] = useState(2026);
      const [fromMonth, setFromMonth] = useState(1);
      const [toMonth, setToMonth] = useState(12);
      const [printDate, setPrintDate] = useState('');
      const [showPrintNotice, setShowPrintNotice] = useState(false);

      useEffect(() => {
        if (onRefresh) onRefresh();
        setToMonth(12);
      }, [selectedYear]);

      const isIframe = useMemo(() => {
        try {
          return window.self !== window.top;
        } catch (e) {
          return true;
        }
      }, []);

      const handlePrint = () => {
        // Always try to invoke window.print()
        try {
          window.print();
        } catch (error) {
          console.error("Print invocation failed:", error);
        }
        
        // Show guidance notice if inside iframe where print might be blocked or fails to open
        if (isIframe) {
          setShowPrintNotice(true);
        }
      };

      useEffect(() => {
        const updateDate = () => {
          const now = new Date();
          const yr = now.getFullYear();
          const mt = String(now.getMonth() + 1).padStart(2, '0');
          const dy = String(now.getDate()).padStart(2, '0');
          const hr = String(now.getHours()).padStart(2, '0');
          const mn = String(now.getMinutes()).padStart(2, '0');
          const sc = String(now.getSeconds()).padStart(2, '0');
          setPrintDate(`${yr}-${mt}-${dy} ${hr}:${mn}:${sc}`);
        };
        updateDate();
        window.addEventListener('beforeprint', updateDate);
        return () => window.removeEventListener('beforeprint', updateDate);
      }, []);

      const yearTargets = useMemo(() => {
        return targets[selectedYear] || TARGETS_2026;
      }, [targets, selectedYear]);

      const handleFromMonthChange = (e) => {
        const val = Number(e.target.value);
        setFromMonth(val);
        if (val > toMonth) {
          setToMonth(val);
        }
      };

      const handleToMonthChange = (e) => {
        const val = Number(e.target.value);
        if (val < fromMonth) {
          setFromMonth(val);
        }
        setToMonth(val);
      };

      const yearRecords = useMemo(() => records.filter(r => r.year === selectedYear), [records, selectedYear]);

      // Calculate period-specific stats (fromMonth to toMonth)
      const periodStats = useMemo(() => {
        let actualDiesel = 0;
        let actualCityGas = 0;
        let actualElectricity = 0;
        let actualWater = 0;
        let actualRevenue = 0;

        let targetDiesel = 0;
        let targetCityGas = 0;
        let targetElectricity = 0;
        let targetWater = 0;

        let activeMonthsCount = 0;
        const activeMonthsList = [];

        for (let m = fromMonth; m <= toMonth; m++) {
          const target = yearTargets[m - 1] || yearTargets[0] || TARGETS_2026[0];
          const record = yearRecords.find(r => r.month === m);

          // Sum target values for the selected months (to provide period aggregate guideline)
          targetDiesel += target.diesel || 0;
          targetCityGas += target.cityGas || 0;
          targetElectricity += target.electricity || 0;
          targetWater += target.water || 0;

          if (record) {
            actualDiesel += record.diesel || 0;
            actualCityGas += record.cityGas || 0;
            actualElectricity += record.electricity || 0;
            actualWater += record.water || 0;
            actualRevenue += record.revenue || 0;

            activeMonthsCount++;
            activeMonthsList.push(m);
          }
        }

        const actualEm = calculateEmissions(actualDiesel, actualCityGas, actualElectricity);
        const targetEm = calculateEmissions(targetDiesel, targetCityGas, targetElectricity);

        return {
          actualDiesel,
          actualCityGas,
          actualElectricity,
          actualWater,
          actualRevenue,
          targetDiesel,
          targetCityGas,
          targetElectricity,
          targetWater,
          actualScope1: actualEm.scope1,
          actualScope2: actualEm.scope2,
          actualTotal: actualEm.total,
          targetScope1: targetEm.scope1,
          targetScope2: targetEm.scope2,
          targetTotal: targetEm.total,
          activeMonthsCount,
          activeMonthsList,
          intensity: actualRevenue > 0 ? (actualEm.total / actualRevenue) : 0
        };
      }, [yearRecords, fromMonth, toMonth, yearTargets]);

      // Yearly stats (1 to 12) for the table footer
      const yearStats = useMemo(() => {
        let diesel = 0;
        let cityGas = 0;
        let electricity = 0;
        let water = 0;
        let revenue = 0;
        let activeMonths = 0;

        for (let m = 1; m <= 12; m++) {
          const r = yearRecords.find(rec => rec.month === m);
          if (r) {
            diesel += r.diesel || 0;
            cityGas += r.cityGas || 0;
            electricity += r.electricity || 0;
            water += r.water || 0;
            revenue += r.revenue || 0;
            activeMonths++;
          }
        }

        const em = calculateEmissions(diesel, cityGas, electricity);
        return {
          diesel,
          cityGas,
          electricity,
          water,
          revenue,
          emissions: em.total,
          intensity: revenue > 0 ? (em.total / revenue) : 0,
          activeMonths
        };
      }, [yearRecords]);

      // Primary Mixed Graph Data (fromMonth to toMonth)
      const chartData1 = useMemo(() => {
        const data = [];
        for (let m = fromMonth; m <= toMonth; m++) {
          const target = yearTargets[m - 1] || yearTargets[0] || TARGETS_2026[0];
          const record = yearRecords.find(r => r.month === m);

          const targetEm = calculateEmissions(target.diesel, target.cityGas, target.electricity);
          const actualEm = record ? calculateEmissions(record.diesel, record.cityGas, record.electricity) : null;

          data.push({
            month: m,
            scope1: actualEm ? actualEm.scope1 : 0,
            scope2: actualEm ? actualEm.scope2 : 0,
            target: targetEm.total,
          });
        }
        return data;

      // Revenue & Intensity Graph Data (fromMonth to toMonth)

        const data = [];
        for (let m = fromMonth; m <= toMonth; m++) {
          const record = yearRecords.find(r => r.month === m);
          const actualEm = record ? calculateEmissions(record.diesel, record.cityGas, record.electricity) : null;
          const revenue = record && record.revenue !== undefined ? record.revenue : null;
          const intensity = record && record.revenue > 0 && actualEm ? (actualEm.total / record.revenue) : null;

          data.push({
            month: m,
            revenue: revenue,
            intensity: intensity,
          });
        }
        return data;

                </span>
              ) : (
                <span className="px-2.5 py-1 text-[10px] font-mono font-bold tracking-wider uppercase border whitespace-nowrap mt-1 bg-gray-100 text-gray-500 border-gray-300">
                  데이터 없음
                </span>

            </div>

            <div className="space-y-2 font-mono text-xs mt-3">
              <div className="flex justify-between items-center text-[#57534E]">
                <span>실제 사용량:</span>
                <span className="font-bold text-[#1C1A17]">{value !== undefined ? formatVal(value, 2) : '0.00'} {unit}</span>
              </div>
              <div className="flex justify-between items-center text-[#78716C]">
                <span>기준 목표치:</span>
                <span>{formatVal(target, 2)} {unit}</span>
              </div>
              <div className="flex justify-between items-center text-[#57534E] border-t border-[#1C1A17]/10 pt-2 text-[11px]">
                <span className="font-medium">환산 배출량:</span>
                <span className="font-bold text-[#1C1A17]">{formatVal(value * factor, 2)} tCO₂e</span>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="space-y-8 font-sans">
          {/* Print Official Header (Only visible when printing / PDF generation) */}
          <div className="hidden print:block border-b-4 border-[#1C1A17] pb-5 mb-8">
            <div className="flex justify-between items-end">
              <div>
                <span className="text-[10px] text-[#78716C] font-mono tracking-widest block uppercase font-bold">CONFIDENTIAL — GHG EMISSIONS STANDARD REPORT</span>
                <h1 className="text-3xl font-extrabold tracking-tight text-[#1C1A17] font-display mt-1">
                  (주)대성스틸 온실가스 인벤토리 공식 보고서
                </h1>
                <p className="text-xs text-[#57534E] font-mono mt-1">
                  OFFICIAL GREENHOUSE GAS EMISSIONS STATEMENT & INVENTORY RECORD
                </p>
              </div>
              <div className="text-right">
                <div className="w-14 h-14 bg-[#1C1A17] text-[#FAF9F6] flex items-center justify-center font-bold text-lg ml-auto mb-1">DS</div>
                <span className="text-[10px] text-[#78716C] font-semibold block">(주)대성스틸 안전환경본부</span>
              </div>
            </div>

            <div className="grid grid-cols-4 gap-4 mt-6 border-t border-[#1C1A17]/20 pt-4 text-[11px] font-sans">
              <div className="border border-[#1C1A17]/10 p-2 bg-[#FAF9F6]/50">
                <span className="text-[#78716C] block uppercase font-mono text-[9px] tracking-wider font-semibold">보고 연도</span>
                <strong className="text-[#1C1A17] text-xs font-mono">{selectedYear}년도</strong>

              <div className="border border-[#1C1A17]/10 p-2 bg-[#FAF9F6]/50">

                <strong className="text-[#1C1A17] text-xs font-mono">{fromMonth}월 ~ {toMonth}월 (누적)</strong>
              </div>
              <div className="border border-[#1C1A17]/10 p-2 bg-[#FAF9F6]/50">
                <span className="text-[#78716C] block uppercase font-mono text-[9px] tracking-wider font-semibold">검증 검인 표준</span>
                <strong className="text-[#1C1A17] text-xs">IPCC / 국가 배출 계수 기준</strong>
              </div>
              <div className="border border-[#1C1A17]/10 p-2 bg-[#FAF9F6]/50">
                <span className="text-[#78716C] block uppercase font-mono text-[9px] tracking-wider font-semibold">문서 관리 코드</span>
                <strong className="text-[#1C1A17] text-xs font-mono">DS-GHG-{selectedYear}-{String(fromMonth).padStart(2,'0')}{String(toMonth).padStart(2,'0')}</strong>
              </div>

          {/* Controls */}

            <div className="flex items-center gap-2.5">
              <div className="p-2 bg-[#1C1A17] text-white">
                <Icon name="dashboard" className="w-5 h-5" />
              </div>
              <div>
                <h2 className="text-base sm:text-lg font-bold text-[#1C1A17] font-display">종합 실적 모니터링 대시보드</h2>
                <p className="text-[11px] sm:text-xs text-[#57534E]">지정된 시작월 ~ 종료월 기간의 탄소 집약도 배출 성과 실적</p>
              </div>

            <div className="flex flex-wrap items-center gap-3">
              <select

                  setSelectedYear(Number(e.target.value));

                }}
                className="h-9 bg-[#FAF9F6] border border-[#E5E2D9] px-3 text-xs sm:text-sm font-mono cursor-pointer focus:outline-none focus:border-[#1C1A17]"
              >
                {availableYears.map(yr => (
                  <option key={yr} value={yr}>{yr}년</option>

              </select>
              
              <div className="flex items-center gap-1.5 bg-[#FAF9F6] border border-[#E5E2D9] px-2.5 h-9 text-xs sm:text-sm">
                <span className="text-[#78716C] font-semibold text-[11px] mr-1 uppercase">시작</span>
                <select
                  id="start-month"
                  value={fromMonth}
                  onChange={handleFromMonthChange}
                  className="bg-transparent font-mono cursor-pointer focus:outline-none"
                >
                  {Array.from({ length: 12 }, (_, i) => (
                    <option key={i + 1} value={i + 1}>{i + 1}월</option>
                  ))}
                </select>
                <span className="text-[#78716C] px-1 font-semibold">~</span>
                <span className="text-[#78716C] font-semibold text-[11px] mr-1 uppercase">종료</span>
                <select
                  id="end-month"
                  value={toMonth}
                  onChange={handleToMonthChange}
                  className="bg-transparent font-mono cursor-pointer focus:outline-none"
                >
                  {Array.from({ length: 12 }, (_, i) => (
                    <option key={i + 1} value={i + 1}>{i + 1}월</option>
                  ))}
                </select>
              </div>

              {/* Report Print Button */}
              <button
                onClick={handlePrint}
                className="flex items-center gap-1.5 h-9 px-3 bg-[#15803D] hover:bg-[#166534] text-white text-xs sm:text-sm font-bold transition-all cursor-pointer shadow-sm border border-[#15803D]/10 rounded-none shrink-0"
                title="공식 온실가스 인벤토리 보고서 출력 및 PDF 저장"
              >
                <Icon name="print" className="w-3.5 h-3.5" />
                <span>보고서 출력</span>
              </button>
            </div>
          </div>

          {/* Single Integrated Performance Analysis Card */}
          <div className="bg-white border border-[#1C1A17]/15 p-6 shadow-sm space-y-6 print-avoid-break">
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-[#1C1A17]/10 pb-4">
              <div>
                <h3 className="text-base sm:text-lg font-bold text-[#1C1A17] uppercase tracking-wider font-display flex items-center gap-2">
                  <Icon name="dashboard" className="w-5 h-5 text-[#1C1A17]" />
                  {selectedYear}년 {fromMonth}월 ~ {toMonth}월 누적 탄소 명세서 (Carbon Statement)
                </h3>
                <p className="text-xs text-[#57534E] mt-0.5">선택한 조회 기간 동안의 온실가스 배출 실적 및 가이드라인 대비 달성 성과를 종합 분석합니다.</p>
              </div>
              <div className="flex items-center gap-1.5 bg-[#FAF9F6] border border-[#E5E2D9] px-2.5 py-1 text-xs font-mono">
                <span className="text-[#78716C] uppercase font-bold text-[9px]">조회 범위 내 입력 완료:</span>
                <span className="text-[#1C1A17] font-bold">{periodStats.activeMonthsCount} / {(toMonth - fromMonth + 1)} 개월</span>
              </div>
            </div>

            {periodStats.activeMonthsCount > 0 ? (
              <div className="space-y-6">
                {/* 5 KPI Cards placed horizontally at the top */}
                <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 font-mono">

                  </div>
                  <div className="bg-[#FAF9F6] p-4 border border-[#1C1A17]/10">
                    <span className="text-[10px] text-[#78716C] uppercase tracking-wider block font-semibold">선택 기간 목표 배출량</span>
                    <span className="text-xl sm:text-2xl font-bold text-[#0D9488]">{formatVal(periodStats.targetTotal, 2)}</span>
                    <span className="text-xs text-[#78716C] ml-1">t</span>
                  </div>
                  <div className="bg-[#FAF9F6] p-4 border border-[#1C1A17]/10">
                    <span className="text-[10px] text-[#78716C] uppercase tracking-wider block font-semibold">Scope 1 (직접)</span>
                    <span className="text-lg sm:text-xl font-bold text-[#B45309]">{formatVal(periodStats.actualScope1, 2)}</span>

              <div className="flex flex-col justify-end items-end space-y-8 pr-4">

          {/* Print guidance modal for Iframe environments */}
          {showPrintNotice && (

                  &times;

                <div className="flex items-center gap-3 mb-4">

                    현재 AI Studio 대화창의 <strong>Live Preview (Iframe)</strong> 환경에 접속해 계십니다. 브라우저 보안 정책에 따라 Iframe 내부에서는 직접 인쇄(window.print) 창 실행이 제한될 수 있습니다.

    // --- DATA ENTRY COMPONENT ---
    const DataEntry = ({ records, onSaveRecords, onDeleteRecord, targets, onSaveTargets, onRefresh, availableYears = [2026, 2025, 2024], onRegisterYear, isSaving }) => {
      const [years, setYears] = useState(availableYears);
      const [year, setYear] = useState(2026);
      const [monthlyInputs, setMonthlyInputs] = useState([]);
      const [successMessage, setSuccessMessage] = useState('');
      const [errorMessage, setErrorMessage] = useState('');

      const currentYear = year;
      const setCurrentYear = (val) => {
        setYear(Number(val));
      };

      useEffect(() => {
        if (availableYears) {
          setYears(availableYears);
        }
      }, [availableYears]);

      const handleAddYear = () => {
        const newYearStr = window.prompt("등록하실 새로운 연도를 입력하세요 (예: 2027):");
        if (!newYearStr) return;
        const newYear = parseInt(newYearStr, 10);
        if (isNaN(newYear) || newYear < 2000 || newYear > 2100) {
          alert("올바른 연도 4자리를 입력해주세요.");
          return;
        }
        // 연도 선택 드롭다운 배열에 즉시 추가하여 리렌더링 유발
        if (!years.includes(newYear)) {
          const updatedYears = [...years, newYear].sort((a, b) => b - a);
          setYears(updatedYears); // 연도 상태 업데이트 함수를 반드시 실행해줘
          setCurrentYear(newYear); // 새로 등록한 연도로 자동 전환

          if (onRegisterYear) {
            onRegisterYear(newYear);
          }
          alert(newYear + "년이 성공적으로 등록되었습니다. 실적과 목표를 입력해주세요.");
        } else {
          alert("이미 등록된 연도입니다.");
        }
      };

      useEffect(() => {
        if (onRefresh) onRefresh();
      }, [year]);

      useEffect(() => {
        const loadedInputs = Array.from({ length: 12 }, (_, i) => {
          const monthNum = i + 1;
          const existing = records.find(r => r.year === year && r.month === monthNum);
          return {
            diesel: existing ? (existing.diesel !== undefined && existing.diesel !== null ? existing.diesel.toString() : '') : '',
            cityGas: existing ? (existing.cityGas !== undefined && existing.cityGas !== null ? existing.cityGas.toString() : '') : '',
            electricity: existing ? (existing.electricity !== undefined && existing.electricity !== null ? existing.electricity.toString() : '') : '',
            water: existing ? (existing.water !== undefined && existing.water !== null ? existing.water.toString() : '') : '',
            revenue: existing ? (existing.revenue !== undefined && existing.revenue !== null ? existing.revenue.toString() : '') : '',
          };
        });
        setMonthlyInputs(loadedInputs);
        setErrorMessage('');
        setSuccessMessage('');
      }, [year, records]);

      const handleInputChange = (index, field, value) => {
        setMonthlyInputs(prev => {
          const updated = [...prev];
          updated[index] = { ...updated[index], [field]: value };
          return updated;
        });
      };

      const handleSaveAll = (e) => {
        if (e) e.preventDefault();

        const parsed = [];
        for (let i = 0; i < 12; i++) {
          const row = monthlyInputs[i];
          if (!row) return;
          const monthNum = i + 1;

          const dVal = row.diesel === '' ? 0 : parseFloat(row.diesel);
          const gVal = row.cityGas === '' ? 0 : parseFloat(row.cityGas);
          const eVal = row.electricity === '' ? 0 : parseFloat(row.electricity);
          const wVal = row.water === '' ? 0 : parseFloat(row.water);
          const revVal = row.revenue === '' ? 0 : parseFloat(row.revenue);

          if (isNaN(dVal) || dVal < 0 || isNaN(gVal) || gVal < 0 || isNaN(eVal) || eVal < 0 || isNaN(wVal) || wVal < 0 || isNaN(revVal) || revVal < 0) {
            setErrorMessage(`${monthNum}월 입력 항목에 0 이상의 올바른 숫자를 입력해주세요.`);
            return;
          }

          parsed.push({
            id: `${year}-${monthNum.toString().padStart(2, '0')}`,
            year,
            month: monthNum,
            diesel: dVal,
            cityGas: gVal,
            electricity: eVal,
            water: wVal,
            revenue: revVal
          });
        }

        onSaveRecords(year, parsed);
        setErrorMessage('');
      };

      const handleClear = () => {
        if (window.confirm(`${year}년의 모든 월별 실적 입력칸을 지우시겠습니까? (저장된 정보는 지워지지 않습니다)`)) {
          setMonthlyInputs(Array.from({ length: 12 }, () => ({
            diesel: '',
            cityGas: '',
            electricity: '',
            water: '',
            revenue: '',
          })));
        }
      };

      if (monthlyInputs.length === 0) return null;

      return (
        <div className="bg-white border border-[#1C1A17]/15 p-6 shadow-sm space-y-6">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pb-4 border-b border-[#FAF9F6]">
            <div className="flex items-center gap-3">
              <div className="p-2.5 bg-[#1C1A17] text-[#FAF9F6]">
                <Icon name="edit" className="w-5 h-5" />
              </div>
              <div>
                <h2 className="text-base sm:text-lg font-bold text-[#1C1A17] font-display">월별 실제 실적 일괄 입력 및 관리</h2>
                <p className="text-xs text-[#57534E] mt-0.5">선택한 연도의 1월부터 12월까지의 실제 소비 실적 및 매출액을 표(Grid) 형식으로 일괄 입력 및 동기화하십시오.</p>
              </div>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-xs text-[#78716C] font-semibold">연도 선택:</span>
              <select
                value={year}
                onChange={(e) => setYear(Number(e.target.value))}
                className="bg-[#FAF9F6] border border-[#E5E2D9] px-3 py-1.5 text-xs sm:text-sm font-mono cursor-pointer focus:outline-none focus:border-[#1C1A17]"
              >
                {years.map(y => (
                  <option key={y} value={y}>{y}년</option>
                ))}
              </select>
              <button
                type="button"
                onClick={handleAddYear}
                className="px-3 py-1.5 bg-[#1C1A17] hover:bg-[#1C1A17]/85 text-[#FAF9F6] text-xs font-bold transition-all cursor-pointer whitespace-nowrap flex items-center gap-1 shadow-sm"
              >
                <Icon name="plus" className="w-3.5 h-3.5" />
                <span>+ 새 연도 등록</span>
              </button>
              <button
                type="button"
                onClick={handleClear}
                className="px-3 py-1.5 border border-[#1C1A17]/30 hover:bg-[#F2EFE9] text-xs font-bold transition-all cursor-pointer whitespace-nowrap"
              >
                입력칸 비우기
              </button>
            </div>
          </div>

          <form onSubmit={handleSaveAll} className="space-y-6">
            <div className="overflow-x-auto border border-[#1C1A17]/10 w-full">
              <table className="w-full text-left border-collapse table-auto text-xs">
                <thead>
                  <tr className="bg-[#FAF9F6] border-b border-[#1C1A17]/15 text-[10px] sm:text-[11px] font-bold text-[#57534E] uppercase tracking-wider font-mono">
                    <th className="py-2.5 px-3 text-center whitespace-nowrap border-r border-[#1C1A17]/10 w-16">월 구분</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">경유 실적 (L)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">도시가스 실적 (Nm³)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">구매전력 실적 (kWh)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">상수도 실적 (TON)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">매출액 (억원)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap">예상 탄소 배출량 (tCO₂e)</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-[#1C1A17]/10 text-xs text-[#1C1A17] font-mono">
                  {Array.from({ length: 12 }, (_, i) => {
                    const m = i + 1;
                    const row = monthlyInputs[i];
                    if (!row) return null;
                    const dVal = parseFloat(row.diesel) || 0;
                    const gVal = parseFloat(row.cityGas) || 0;
                    const eVal = parseFloat(row.electricity) || 0;
                    const calc = calculateEmissions(dVal, gVal, eVal);

                    return (
                      <tr key={m} className="hover:bg-[#FCFAF7] transition-colors">
                        <td className="py-2 px-3 text-center font-bold text-[#1C1A17] border-r border-[#1C1A17]/10 bg-[#FAF9F6]">
                          {m}월
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            type="number"
                            step="any"
                            value={row.diesel}
                            onChange={(e) => handleInputChange(i, 'diesel', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono"
                            placeholder="0"
                          />
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            type="number"
                            step="any"
                            value={row.cityGas}
                            onChange={(e) => handleInputChange(i, 'cityGas', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono"
                            placeholder="0"
                          />
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            type="number"
                            step="any"
                            value={row.electricity}
                            onChange={(e) => handleInputChange(i, 'electricity', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono"
                            placeholder="0"
                          />
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            type="number"
                            step="any"
                            value={row.water}
                            onChange={(e) => handleInputChange(i, 'water', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono"
                            placeholder="0"
                          />
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            type="number"
                            step="any"
                            value={row.revenue}
                            onChange={(e) => handleInputChange(i, 'revenue', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono font-bold text-blue-700"
                            placeholder="0"
                          />
                        </td>
                        <td className="py-2 px-3 text-right font-bold text-[#1E40AF]">
                          {calc.total.toFixed(3)} t
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {errorMessage && <p className="text-xs text-red-600 font-semibold">{errorMessage}</p>}
            {successMessage && <p className="text-xs text-green-700 font-semibold">{successMessage}</p>}

            <div className="flex justify-end gap-3 pt-2">
              <button
                type="submit"
                onClick={handleSaveAll}
                disabled={isSaving}
                className="px-6 py-3 bg-[#1C1A17] disabled:bg-[#1C1A17]/60 text-white text-xs font-bold hover:bg-[#2C2A27] transition-all cursor-pointer flex items-center gap-1.5 shadow-sm"
              >
                {isSaving ? (
                  <>
                    <span className="animate-spin rounded-full h-4 w-4 border-2 border-[#FAF9F6] border-t-transparent inline-block mr-1"></span>
                    <span>데이터 처리 중...</span>
                  </>
                ) : (
                  <>
                    <Icon name="database" className="w-4 h-4" /> <span>{year}년도 실적 일괄 저장 및 동기화</span>
                  </>
                )}
              </button>
            </div>
          </form>
        </div>
      );
    };


    // --- ROADMAP COMPONENT ---
    const Roadmap = ({ records }) => {
      const [solarRate, setSolarRate] = useState(0);
      const [burnerEfficiency, setBurnerEfficiency] = useState(0);
      const [evTransition, setEvTransition] = useState(0);

      const actualAnnualEmissions = useMemo(() => {
        const sums = {};
        records.forEach(r => {
          const em = calculateEmissions(r.diesel, r.cityGas, r.electricity);
          if (!sums[r.year]) sums[r.year] = { total: 0, months: 0 };
          sums[r.year].total += em.total;
          sums[r.year].months++;
        });

        return Object.keys(sums).map(yrStr => {
          const yr = parseInt(yrStr);
          const data = sums[yr];
          let total = data.total;
          const isExtrapolated = data.months < 12;
          if (isExtrapolated && data.months > 0) {
            total = (data.total / data.months) * 12;
          }
          return { year: yr, actual: parseFloat(total.toFixed(3)), monthsCount: data.months, isExtrapolated };
        });
      }, [records]);

      const simulatedData = useMemo(() => {
        const baseScope1Gas = 80.0;
        const baseScope1Diesel = 12.720;
        const baseScope2Elec = 486.396;

        const s2Reduction = baseScope2Elec * (solarRate / 100) * 0.45;
        const simScope2 = baseScope2Elec - s2Reduction;

        const gasReduction = baseScope1Gas * (burnerEfficiency / 100) * 0.25;
        const simScope1Gas = baseScope1Gas - gasReduction;

        const dieselReduction = baseScope1Diesel * (evTransition / 100) * 0.80;
        const simScope1Diesel = baseScope1Diesel - dieselReduction;

        const evElecAddition = baseScope1Diesel * (evTransition / 100) * 0.10;

        return {
          scope1: simScope1Gas + simScope1Diesel,
          scope2: simScope2 + evElecAddition,
          total: simScope1Gas + simScope1Diesel + simScope2 + evElecAddition
        };
      }, [solarRate, burnerEfficiency, evTransition]);

      const chartData = useMemo(() => {
        return ROADMAP_TARGETS.map(targetPoint => {
          const year = targetPoint.year;
          const actualPt = actualAnnualEmissions.find(a => a.year === year);
          let projectionValue = null;

          if (year === 2025) {
            projectionValue = 579.116;
          } else if (year === 2026) {
            projectionValue = parseFloat((579.116 - (579.116 - simulatedData.total) * 0.2).toFixed(3));
          } else {
            const factor = (year - 2026) / 4;
            projectionValue = parseFloat((579.116 - (579.116 - simulatedData.total) * factor).toFixed(3));
          }

          return {
            year: `${year}년`,
            target: targetPoint.target,
            actual: actualPt ? actualPt.actual : null,
            sim: projectionValue
          };
        });
      }, [actualAnnualEmissions, simulatedData]);

      const isGoalMetIn2030 = simulatedData.total <= 470.756;

      return (
        <div className="space-y-8 font-sans">
          <div className="bg-[#F2EFE9] p-5 border border-[#E5E2D9] flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div className="flex items-center gap-4">
              <div className="p-3 bg-[#1C1A17] text-[#FAF9F6]">
                <Icon name="compass" className="w-6 h-6" />
              </div>
              <div>
                <h2 className="text-base sm:text-lg font-bold text-[#1C1A17] tracking-tight font-display">대성스틸 2030 저탄소 중기 로드맵 & 감축 시뮬레이터</h2>
                <p className="text-xs text-[#57534E] mt-0.5">환경부 2030 온실가스 감축 목표(NDC) 경로 추종 여부 판단 및 가상 에너지 효율화 시뮬레이션</p>
              </div>
            </div>
            <span className="text-xs bg-white px-3 py-1.5 text-[#1C1A17] font-mono border border-[#E5E2D9] font-bold">기준 연도: 2025년 (579.116 t)</span>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div className="xl:col-span-2 bg-white border border-[#1C1A17]/15 p-6 shadow-sm space-y-4">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pb-4 border-b border-[#FAF9F6]">
                <div>
                  <h3 className="text-base font-bold text-[#1C1A17] uppercase tracking-wider font-display">중기 탄소 저감 가이드라인 vs 실적 모니터링</h3>
                  <p className="text-xs text-[#57534E] mt-0.5">실선은 연간 타겟이며, 점선은 자발적 설비 개선 적용 시 시뮬레이션 감축 경로입니다.</p>
                </div>
                <div className="flex flex-wrap gap-4 text-[10px] font-mono">
                  <span className="flex items-center gap-1.5"><span className="w-3.5 h-0.5 bg-[#991B1B]" />감축 목표선</span>
                  <span className="flex items-center gap-1.5"><span className="w-3.5 h-0.5 bg-[#166534] border-t border-dashed" />시뮬레이션 경로</span>
                  <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 bg-[#1E40AF]" />실제 실적 (연환산)</span>
                </div>
              </div>

              <RoadmapSimulatorChart data={chartData} />

              <div className="bg-[#FCFAF7] p-4 border border-[#E5E2D9] text-xs text-[#57534E] leading-relaxed flex items-start gap-2.5">
                <Icon name="info" className="w-5 h-5 text-[#78716C] shrink-0 mt-0.5" />
                <div>
                  <span className="font-bold text-[#1C1A17] block">연환산 가중치 적용 안내 (Extrapolation)</span>
                  <p className="text-[11px] text-[#57534E] mt-1">

            <div className="bg-white border border-[#1C1A17]/15 p-6 shadow-sm flex flex-col justify-between space-y-6">
              <div className="space-y-4">
                <div className="flex items-center gap-2">
                  <Icon name="edit" className="w-5 h-5 text-[#1C1A17]" />
                  <h3 className="text-sm font-bold text-[#1C1A17] uppercase tracking-widest font-mono">저탄소 설비 시뮬레이션 레버</h3>
                </div>
                <p className="text-xs text-[#57534E] leading-relaxed">미래 저감 기술 도입률을 조정하여 2030년 목표 달성 가능 시나리오를 설계하십시오.</p>
                <hr className="border-[#FAF9F6]" />

                {/* Slider 1 */}
                <div className="space-y-2">
                  <div className="flex justify-between text-xs">
                    <span className="text-[#1C1A17] font-bold flex items-center gap-1.5"><Icon name="zap" className="w-3.5 h-3.5 text-amber-600" /> 자가 태양광 발전 (RE100)</span>
                    <span className="text-[#B45309] font-mono font-bold">{solarRate}% 도입</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" value={solarRate} onChange={(e) => setSolarRate(Number(e.target.value))} className="w-full h-1.5 bg-[#EAE6DD] appearance-none cursor-pointer accent-[#1C1A17]" />
                  <span className="text-[10px] text-[#78716C] block">구매전력 최대 45% 대체</span>

                {/* Slider 2 */}
                <div className="space-y-2 pt-1">
                  <div className="flex justify-between text-xs">
                    <span className="text-[#1C1A17] font-bold flex items-center gap-1.5"><Icon name="flame" className="w-3.5 h-3.5 text-amber-600" /> 가스 연소설비 효율화 개조</span>
                    <span className="text-[#B45309] font-mono font-bold">{burnerEfficiency}% 개조</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" value={burnerEfficiency} onChange={(e) => setBurnerEfficiency(Number(e.target.value))} className="w-full h-1.5 bg-[#EAE6DD] appearance-none cursor-pointer accent-[#1C1A17]" />
                  <span className="text-[10px] text-[#78716C] block">가스 사용량 최대 25% 감축</span>
                </div>

                {/* Slider 3 */}
                <div className="space-y-2 pt-1">
                  <div className="flex justify-between text-xs">
                    <span className="text-[#1C1A17] font-bold flex items-center gap-1.5"><Icon name="droplet" className="w-3.5 h-3.5 text-teal-600" /> 전사 차량 및 설비 전기화 (EV)</span>
                    <span className="text-[#15803D] font-mono font-bold">{evTransition}% 전환</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" value={evTransition} onChange={(e) => setEvTransition(Number(e.target.value))} className="w-full h-1.5 bg-[#EAE6DD] appearance-none cursor-pointer accent-[#1C1A17]" />
                  <span className="text-[10px] text-[#78716C] block">경유 최대 80% 절감</span>
                </div>
              </div>

              {/* Outcome */}
              <div className={`p-4 border rounded-none ${isGoalMetIn2030 ? 'bg-[#F0FDF4] border-[#86EFAC] text-[#166534]' : 'bg-[#FEF2F2] border-[#FCA5A5] text-[#991B1B]'}`}>
                <div className="flex items-center gap-1.5 font-bold text-xs uppercase tracking-widest mb-2.5 font-mono">
                  <span>2030년 감축 예측 시나리오 결과</span>
                </div>
                <div className="space-y-2 text-xs font-mono">
                  <div className="flex justify-between border-b border-[#1C1A17]/5 pb-1">
                    <span className="text-[#78716C]">예측 배출량 (2030):</span>
                    <span className="font-bold text-[#1C1A17]">{simulatedData.total.toFixed(3)} t</span>
                  </div>
                  <div className="flex justify-between border-b border-[#1C1A17]/5 pb-1">
                    <span className="text-[#78716C]">국가 감축 목표치 (2030):</span>
                    <span className="text-[#78716C]">470.756 t</span>
                  </div>
                  <div className="border-t border-[#1C1A17]/10 my-2 pt-2 flex justify-between items-center text-xs sm:text-sm">
                    <span className="font-bold">목표 달성 여부:</span>
                    <span className={`font-bold px-2 py-0.5 border text-xs ${isGoalMetIn2030 ? 'bg-[#F0FDF4] text-[#166534] border-[#86EFAC]' : 'bg-[#FEF2F2] text-[#991B1B] border-[#FCA5A5]'}`}>
                      {isGoalMetIn2030 ? '목표 달성 성공' : '감축 역량 부족'}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Table */}
          <div className="bg-white border border-[#1C1A17]/15 p-6 shadow-sm space-y-4">
            <h3 className="text-sm font-bold text-[#1C1A17] uppercase tracking-widest font-mono flex items-center gap-2">
              <Icon name="trend" className="w-4 h-4 text-[#1C1A17]" /> 대성스틸 연도별 온실가스 저감 국가 제출용 표준 로드맵 타겟 테이블
            </h3>
            <div className="overflow-x-auto border border-[#E5E2D9] bg-[#FCFAF7]">
              <table className="w-full text-left border-collapse text-xs">
                <thead>
                  <tr className="bg-[#F2EFE9] border-b border-[#E5E2D9] text-[#57534E] uppercase font-mono tracking-wider font-semibold">
                    <th className="p-3">연도 구분</th>
                    <th className="p-3">배출 목표총량 (tCO₂e)</th>
                    <th className="p-3">Scope 1 (직접) 목표</th>
                    <th className="p-3">Scope 2 (간접) 목표</th>
                    <th className="p-3">연간 누적 감축 비율</th>
                    <th className="p-3 text-right">상태 구분</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-[#E5E2D9] font-mono text-[#1C1A17]">
                  {ROADMAP_TARGETS.map((r, idx) => {
                    const reductionPercent = idx === 0 ? 0 : ((579.116 - r.target) / 579.116) * 100;
                    return (
                      <tr key={r.year} className="hover:bg-white transition-colors">
                        <td className="p-3 font-bold">{r.label} ({r.year}년)</td>
                        <td className="p-3 font-bold">{r.target.toFixed(3)} t</td>
                        <td className="p-3 text-[#57534E]">{r.scope1 ? `${r.scope1.toFixed(3)} t` : '탄력적 분배'}</td>
                        <td className="p-3 text-[#57534E]">{r.scope2 ? `${r.scope2.toFixed(3)} t` : '탄력적 분배'}</td>
                        <td className="p-3">
                          <span className={idx === 0 ? 'text-[#78716C]' : 'text-[#166534] font-bold'}>
                            {idx === 0 ? '기준년도' : `▼ ${reductionPercent.toFixed(2)}%`}
                          </span>
                        </td>
                        <td className="p-3 text-right">
                          {idx === 0 ? (
                            <span className="px-2 py-0.5 text-[9px] bg-slate-100 text-slate-700 border uppercase font-bold">Baseline</span>
                          ) : idx === 1 ? (
                            <span className="px-2 py-0.5 text-[9px] bg-amber-100 text-amber-700 border border-amber-300 uppercase font-bold">당해 실행 중</span>
                          ) : (
                            <span className="px-2 py-0.5 text-[9px] bg-slate-100 text-slate-700 border uppercase font-bold">예정 목표</span>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };


    // --- TARGET SETTING COMPONENT ---
    const TargetSetting = ({ targets, onSaveTargets, records, onRefresh, availableYears = [2026, 2025, 2024], onRegisterYear, isSaving }) => {
      const [years, setYears] = useState(availableYears);
      const [selectedYear, setSelectedYear] = useState(2026);
      const [editedTargets, setEditedTargets] = useState([]);
      const [successMessage, setSuccessMessage] = useState('');
      const [errorMessage, setErrorMessage] = useState('');

      const currentYear = selectedYear;
      const setCurrentYear = (val) => {
        setSelectedYear(Number(val));
      };

      useEffect(() => {
        if (availableYears) {
          setYears(availableYears);
        }
      }, [availableYears]);

      const handleAddYear = () => {
        const newYearStr = window.prompt("등록하실 새로운 연도를 입력하세요 (예: 2027):");
        if (!newYearStr) return;
        const newYear = parseInt(newYearStr, 10);
        if (isNaN(newYear) || newYear < 2000 || newYear > 2100) {
          alert("올바른 연도 4자리를 입력해주세요.");
          return;
        }
        // 연도 선택 드롭다운 배열에 즉시 추가하여 리렌더링 유발
        if (!years.includes(newYear)) {
          const updatedYears = [...years, newYear].sort((a, b) => b - a);
          setYears(updatedYears); // 연도 상태 업데이트 함수를 반드시 실행해줘
          setCurrentYear(newYear); // 새로 등록한 연도로 자동 전환

          if (onRegisterYear) {
            onRegisterYear(newYear);
          }
          alert(newYear + "년이 성공적으로 등록되었습니다. 실적과 목표를 입력해주세요.");
        } else {
          alert("이미 등록된 연도입니다.");
        }
      };

      useEffect(() => {
        if (onRefresh) onRefresh();
      }, [selectedYear]);

      useEffect(() => {
        const yearData = targets[selectedYear] || TARGETS_2026;
        setEditedTargets(yearData.map(t => ({
          diesel: (t.diesel !== undefined && t.diesel !== null) ? t.diesel.toString() : '',
          cityGas: (t.cityGas !== undefined && t.cityGas !== null) ? t.cityGas.toString() : '',
          electricity: (t.electricity !== undefined && t.electricity !== null) ? t.electricity.toString() : '',
          water: (t.water !== undefined && t.water !== null) ? t.water.toString() : '',
          revenue: (t.revenue !== undefined && t.revenue !== null) ? t.revenue.toString() : '120'
        })));
      }, [selectedYear, targets]);

      const handleInputChange = (index, field, value) => {
        setEditedTargets(prev => {
          const updated = [...prev];
          updated[index] = { ...updated[index], [field]: value };
          return updated;
        });
      };

      const handleSaveAll = (e) => {
        if (e) e.preventDefault();

        const parsed = [];
        for (let i = 0; i < 12; i++) {
          const t = editedTargets[i];
          if (!t) return;
          const d = parseFloat(t.diesel);
          const g = parseFloat(t.cityGas);
          const el = parseFloat(t.electricity);
          const w = parseFloat(t.water);
          const r = parseFloat(t.revenue) || 120;

          if (isNaN(d) || d < 0 || isNaN(g) || g < 0 || isNaN(el) || el < 0 || isNaN(w) || w < 0) {
            setErrorMessage(`${i + 1}월 목표 항목에 0 이상의 올바른 숫자를 입력해주세요.`);
            return;
          }
          parsed.push({ diesel: d, cityGas: g, electricity: el, water: w, revenue: r });
        }

        onSaveTargets(selectedYear, parsed);
        setErrorMessage('');
      };

      const handleLoadDefaults = () => {
        if (window.confirm(`${selectedYear}년도 목표 설정 기본값으로 전년(${selectedYear - 1}년) 동월 실제 사용량 대비 3% 감축(사용량 * 0.97)한 가이드라인 목표를 일괄 불러오시겠습니까?`)) {
          const currentRecords = records;

          const updated = editedTargets.map((t, idx) => {
            const m = idx + 1;
            const prevYear = selectedYear - 1;
            const prevRecord = currentRecords.find(r => Number(r.year) === prevYear && Number(r.month) === m);
            const def = DAESUNG_SEASONAL_TARGETS[idx] || { diesel: 0, cityGas: 0, electricity: 0, water: 0 };

            const getTarget = (key, fallbackVal) => {
              if (prevRecord && prevRecord[key] !== undefined && prevRecord[key] !== null && prevRecord[key] !== '') {
                const val = parseFloat(prevRecord[key]);
                if (!isNaN(val)) {
                  return Math.round(val * 0.97);
                }
              }
              return fallbackVal;
            };

            return {
              ...t,
              diesel: getTarget('diesel', def.diesel).toString(),
              cityGas: getTarget('cityGas', def.cityGas).toString(),
              electricity: getTarget('electricity', def.electricity).toString(),
              water: getTarget('water', def.water).toString()
            };
          });

          setEditedTargets(updated);
        }
      };

      if (editedTargets.length === 0) return null;

      return (
        <div className="bg-white border border-[#1C1A17]/15 p-6 shadow-sm space-y-6">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pb-4 border-b border-[#FAF9F6]">
            <div className="flex items-center gap-3">
              <div className="p-2.5 bg-[#1C1A17] text-[#FAF9F6]">
                <Icon name="edit" className="w-5 h-5" />
              </div>
              <div>
                <h2 className="text-base sm:text-lg font-bold text-[#1C1A17] font-display">에너지원별 월별 목표 설정</h2>
                <p className="text-xs text-[#57534E] mt-0.5">선택한 연도의 1월부터 12월까지 각 에너지원별 가이드라인 목표 사용량을 세밀하게 구성하십시오.</p>
              </div>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-xs text-[#78716C] font-semibold">연도 설정:</span>
              <select
                value={selectedYear}
                onChange={(e) => setSelectedYear(Number(e.target.value))}
                className="bg-[#FAF9F6] border border-[#E5E2D9] px-3 py-1.5 text-xs sm:text-sm font-mono cursor-pointer focus:outline-none focus:border-[#1C1A17]"
              >
                {years.map(y => (
                  <option key={y} value={y}>{y}년</option>
                ))}
              </select>
              <button
                type="button"
                onClick={handleAddYear}
                className="px-3 py-1.5 bg-[#1C1A17] hover:bg-[#1C1A17]/85 text-[#FAF9F6] text-xs font-bold transition-all cursor-pointer whitespace-nowrap flex items-center gap-1 shadow-sm"
              >
                <Icon name="plus" className="w-3.5 h-3.5" />
                <span>+ 새 연도 등록</span>
              </button>
              <button
                type="button"
                onClick={handleLoadDefaults}
                className="px-3 py-1.5 border border-[#1C1A17]/30 hover:bg-[#F2EFE9] text-xs font-bold transition-all cursor-pointer whitespace-nowrap"
              >
                기본값 불러오기
              </button>
            </div>
          </div>

          <form onSubmit={handleSaveAll} className="space-y-6">
            <div className="overflow-x-auto border border-[#1C1A17]/10 w-full">
              <table className="w-full text-left border-collapse table-auto text-xs">
                <thead>
                  <tr className="bg-[#FAF9F6] border-b border-[#1C1A17]/15 text-[10px] sm:text-[11px] font-bold text-[#57534E] uppercase tracking-wider font-mono">
                    <th className="py-2.5 px-3 text-center whitespace-nowrap border-r border-[#1C1A17]/10 w-16">월구분</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">경유 목표 (L)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">도시가스 목표 (Nm³)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">구매전력 목표 (kWh)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap border-r border-[#1C1A17]/10">상수도 목표 (TON)</th>
                    <th className="py-2.5 px-3 text-right whitespace-nowrap">예상 탄소 배출량 (tCO₂e)</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-[#1C1A17]/10 text-xs text-[#1C1A17] font-mono">
                  {Array.from({ length: 12 }, (_, i) => {
                    const m = i + 1;
                    const t = editedTargets[i];
                    if (!t) return null;
                    const dVal = parseFloat(t.diesel) || 0;
                    const gVal = parseFloat(t.cityGas) || 0;
                    const eVal = parseFloat(t.electricity) || 0;
                    const calc = calculateEmissions(dVal, gVal, eVal);

                    return (
                      <tr key={m} className="hover:bg-[#FCFAF7] transition-colors">
                        <td className="py-2 px-3 text-center font-bold text-[#1C1A17] border-r border-[#1C1A17]/10 bg-[#FAF9F6]">
                          {m}월
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            id={`diesel-target-${m}`}
                            type="number"
                            step="any"
                            required
                            value={t.diesel}
                            onChange={(e) => handleInputChange(i, 'diesel', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono"
                          />
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            id={`citygas-target-${m}`}
                            type="number"
                            step="any"
                            required
                            value={t.cityGas}
                            onChange={(e) => handleInputChange(i, 'cityGas', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono"
                          />
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            id={`electricity-target-${m}`}
                            type="number"
                            step="any"
                            required
                            value={t.electricity}
                            onChange={(e) => handleInputChange(i, 'electricity', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono"
                          />
                        </td>
                        <td className="py-1 px-2 border-r border-[#1C1A17]/10">
                          <input
                            id={`water-target-${m}`}
                            type="number"
                            step="any"
                            required
                            value={t.water}
                            onChange={(e) => handleInputChange(i, 'water', e.target.value)}
                            className="w-full bg-[#FAF9F6] border border-[#E5E2D9] px-2 py-1 text-xs text-right focus:outline-none focus:border-[#1C1A17] font-mono"
                          />
                        </td>
                        <td className="py-2 px-3 text-right font-bold text-[#1E40AF]">
                          {calc.total.toFixed(3)} t
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div className="bg-slate-50 border border-slate-200 p-4 text-sm text-slate-500 leading-relaxed flex items-start gap-2.5 rounded-md shadow-sm">
              <span className="text-base shrink-0">💡</span>
              <p>
                본 시스템의 가이드라인은 (주)대성스틸의 과거 2개년(2025~2026년) 실제 사용량 및 조업 데이터를 기반으로 산출된 '계절성 표준 베이스라인' 모델입니다. 연도별 국가 온실가스 감축 시나리오가 반영된 합리적인 기준점입니다.
              </p>
            </div>

            {errorMessage && <p className="text-xs text-red-600 font-semibold">{errorMessage}</p>}
            {successMessage && <p className="text-xs text-green-700 font-semibold">{successMessage}</p>}

            <div className="flex justify-end gap-3 pt-2">
              <button
                type="submit"
                onClick={handleSaveAll}
                disabled={isSaving}
                className="px-6 py-3 bg-[#1C1A17] disabled:bg-[#1C1A17]/60 text-white text-xs font-bold hover:bg-[#2C2A27] transition-all cursor-pointer flex items-center gap-1.5 shadow-sm"
              >
                {isSaving ? (
                  <>
                    <span className="animate-spin rounded-full h-4 w-4 border-2 border-[#FAF9F6] border-t-transparent inline-block mr-1"></span>
                    <span>데이터 처리 중...</span>
                  </>
                ) : (
                  <>
                    <Icon name="database" className="w-4 h-4" /> <span>{selectedYear}년 목표 저장하기</span>
                  </>
                )}
              </button>
            </div>
          </form>
        </div>
      );
    };


    // --- APP CONTAINER COMPONENT ---
    const LOCAL_STORAGE_KEY = 'daesung_actual_data';
    const SEED_RECORDS = [
      { id: "2026-01", year: 2026, month: 1, diesel: 95, cityGas: 7400, electricity: 92000, water: 260, revenue: 120 },
      { id: "2026-02", year: 2026, month: 2, diesel: 540, cityGas: 9300, electricity: 96000, water: 410, revenue: 115 },
      { id: "2026-03", year: 2026, month: 3, diesel: 420, cityGas: 8900, electricity: 87000, water: 380, revenue: 130 },
      { id: "2026-04", year: 2026, month: 4, diesel: 710, cityGas: 6100, electricity: 84500, water: 370, revenue: 125 },
      { id: "2026-05", year: 2026, month: 5, diesel: 430, cityGas: 1800, electricity: 67000, water: 230, revenue: 140 },
      { id: "2026-06", year: 2026, month: 6, diesel: 490, cityGas: 950, electricity: 71200, water: 220, revenue: 135 },
    ];

    const DEFAULT_ACTUAL_DATA = {
      2026: SEED_RECORDS,
      2025: [
        { id: "2025-01", year: 2025, month: 1, diesel: 100, cityGas: 7600, electricity: 94000, water: 270, revenue: 120 },
        { id: "2025-02", year: 2025, month: 2, diesel: 550, cityGas: 9500, electricity: 97000, water: 420, revenue: 115 },
        { id: "2025-03", year: 2025, month: 3, diesel: 430, cityGas: 9100, electricity: 89000, water: 390, revenue: 130 },
        { id: "2025-04", year: 2025, month: 4, diesel: 720, cityGas: 6200, electricity: 86000, water: 380, revenue: 125 },
        { id: "2025-05", year: 2025, month: 5, diesel: 440, cityGas: 1900, electricity: 69000, water: 240, revenue: 140 },
        { id: "2025-06", year: 2025, month: 6, diesel: 500, cityGas: 1000, electricity: 73000, water: 230, revenue: 135 },
        { id: "2025-07", year: 2025, month: 7, diesel: 700, cityGas: 600, electricity: 86000, water: 265, revenue: 138 },
        { id: "2025-08", year: 2025, month: 8, diesel: 650, cityGas: 500, electricity: 81000, water: 240, revenue: 130 },
        { id: "2025-09", year: 2025, month: 9, diesel: 600, cityGas: 400, electricity: 89000, water: 260, revenue: 132 },
        { id: "2025-10", year: 2025, month: 10, diesel: 600, cityGas: 800, electricity: 72000, water: 250, revenue: 128 },
        { id: "2025-11", year: 2025, month: 11, diesel: 550, cityGas: 1600, electricity: 84000, water: 240, revenue: 122 },
        { id: "2025-12", year: 2025, month: 12, diesel: 1100, cityGas: 3500, electricity: 102000, water: 245, revenue: 124 },
      ],
      2024: [
        { id: "2024-01", year: 2024, month: 1, diesel: 105, cityGas: 7800, electricity: 96000, water: 280, revenue: 118 },
        { id: "2024-02", year: 2024, month: 2, diesel: 570, cityGas: 9700, electricity: 99000, water: 430, revenue: 110 },
        { id: "2024-03", year: 2024, month: 3, diesel: 450, cityGas: 9300, electricity: 91000, water: 400, revenue: 125 },
        { id: "2024-04", year: 2024, month: 4, diesel: 740, cityGas: 6400, electricity: 88000, water: 390, revenue: 120 },
        { id: "2024-05", year: 2024, month: 5, diesel: 460, cityGas: 2000, electricity: 71000, water: 250, revenue: 135 },
        { id: "2024-06", year: 2024, month: 6, diesel: 520, cityGas: 1100, electricity: 75000, water: 240, revenue: 130 },
        { id: "2024-07", year: 2024, month: 7, diesel: 720, cityGas: 700, electricity: 88000, water: 270, revenue: 134 },
        { id: "2024-08", year: 2024, month: 8, diesel: 670, cityGas: 600, electricity: 83000, water: 250, revenue: 126 },
        { id: "2024-09", year: 2024, month: 9, diesel: 620, cityGas: 500, electricity: 91000, water: 270, revenue: 128 },
        { id: "2024-10", year: 2024, month: 10, diesel: 620, cityGas: 900, electricity: 74000, water: 260, revenue: 124 },
        { id: "2024-11", year: 2024, month: 11, diesel: 570, cityGas: 1700, electricity: 86000, water: 250, revenue: 118 },
        { id: "2024-12", year: 2024, month: 12, diesel: 1150, year: 2024, month: 12, diesel: 1150, cityGas: 3700, electricity: 105000, water: 250, revenue: 120 },
      ]
    };

    const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwjl3TGSLMD7e3R7MwO14rYuX_7JKZaSXX_Rd5Jf25hGrovGNX4YD4mUroBiE9UbRcJ/exec";

    function App() {
      const [records, setRecords] = useState([]);
      const [targets, setTargets] = useState({});
      const [activeTab, setActiveTab] = useState('dashboard');
      const [availableYears, setAvailableYears] = useState([2026, 2025, 2024]);
      const [isLoading, setIsLoading] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);

      const handleTabChange = (tabId) => {
        if (tabId === 'entry' || tabId === 'targets_tab') {
          if (!isAdminAuthenticated) {
            const token = [49, 49, 48, 51].map(c => String.fromCharCode(c)).join('');
            const pin = window.prompt("관리자 인증이 필요합니다. 마스터 비밀번호를 입력하세요:");
            if (pin === token) {
              setIsAdminAuthenticated(true);
              setActiveTab(tabId);
            } else {
              alert("❌ 권한이 없습니다.");
            }
          } else {
            setActiveTab(tabId);
          }
        } else {
          setIsAdminAuthenticated(false);
          setActiveTab(tabId);
        }
      };

      const loadData = async (silent = false) => {
        if (!silent) setIsLoading(true);
        try {
          const res = await fetch(GOOGLE_WEBAPP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action: "load", cellLocation: "A1" })
          });
          const responseJson = await res.json();
          if (responseJson && responseJson.result === "success" && responseJson.data) {
            const parsedState = JSON.parse(responseJson.data);
            
            const loadedYears = Array.isArray(parsedState.availableYears) ? parsedState.availableYears : [2026, 2025, 2024];
            const loadedRecords = Array.isArray(parsedState.records) ? parsedState.records : [];
            const loadedTargets = (parsedState.targets && typeof parsedState.targets === 'object') ? parsedState.targets : {};
            
            setAvailableYears(loadedYears);
            setRecords(loadedRecords);
            setTargets(loadedTargets);
          } else {
            // First run: data is empty/null, initialize with default values
            const defaultYears = [2026, 2025, 2024];
            const grouped = { ...DEFAULT_ACTUAL_DATA };
            const flatRecords = [];
            defaultYears.forEach(yr => {
              const yrRecords = grouped[yr] || [];
              const sanitized = yrRecords.map(r => ({
                ...r,
                revenue: typeof r.revenue === 'number' && !isNaN(r.revenue) ? r.revenue : 120,
              }));
              flatRecords.push(...sanitized);
            });

            const defaultTargets = {};
            defaultYears.forEach(yr => {
              defaultTargets[yr] = TARGETS_2026;
            });

            setAvailableYears(defaultYears);
            setRecords(flatRecords);
            setTargets(defaultTargets);

            // Auto-save the default state so Google Sheet is populated
            const stateToSave = {
              availableYears: defaultYears,
              records: flatRecords,
              targets: defaultTargets
            };
            await fetch(GOOGLE_WEBAPP_URL, {
              method: "POST",
              headers: { "Content-Type": "text/plain" },
              body: JSON.stringify({ action: "save", cellLocation: "A1", data: JSON.stringify(stateToSave) })
            });
          }
        } catch (e) {
          console.error("데이터 로드 중 오류 발생:", e);
        } finally {
          if (!silent) setIsLoading(false);
        }
      };

      const handleSaveAll = async (updatedYears = availableYears, updatedRecords = records, updatedTargets = targets) => {
        try {
          setIsSaving(true);
          const stateToSave = {
            availableYears: updatedYears,
            records: updatedRecords,
            targets: updatedTargets
          };
          const payload = {
            action: "save",
            cellLocation: "A1",
            data: JSON.stringify(stateToSave)
          };
          const response = await fetch(GOOGLE_WEBAPP_URL, {
            method: "POST",
            headers: {
              "Content-Type": "text/plain"
            },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (result && result.result === "success") {
            alert("대성스틸 공용 구글 DB에 안전하게 일괄 저장이 완료되었습니다!");
            return true;
          } else {
            alert("DB 저장 중 오류가 발생했습니다.");
            return false;
          }
        } catch (error) {
          console.error(error);
          alert("구글 서버 통신 실패: " + error.toString());
          return false;
        } finally {
          setIsSaving(false);
        }
      };

      useEffect(() => {
        loadData();
      }, []);

      const handleSaveRecord = async (record) => {
        const nextRecords = [...records];
        const idx = nextRecords.findIndex(r => r.id === record.id);
        if (idx > -1) {
          nextRecords[idx] = record;
        } else {
          nextRecords.push(record);
        }

        const success = await handleSaveAll(availableYears, nextRecords, targets);
        if (success) {
          setRecords(nextRecords);
        }
        return success;
      };

      const handleSaveRecords = async (year, yearRecords) => {
        const filtered = records.filter(r => r.year !== year);
        const nextRecords = [...filtered, ...yearRecords];

        const success = await handleSaveAll(availableYears, nextRecords, targets);
        if (success) {
          setRecords(nextRecords);
        }
        return success;
      };

      const handleDeleteRecord = async (id) => {
        if (window.confirm('정말로 이 월별 실적 기록을 삭제하시겠습니까? 관련 탄소 배출 데이터가 영구 삭제됩니다.')) {
          const nextRecords = records.filter(r => r.id !== id);
          const success = await handleSaveAll(availableYears, nextRecords, targets);
          if (success) {
            setRecords(nextRecords);
          }
        }
      };

      const handleSaveTargets = async (year, newTargets) => {
        const nextTargets = { ...targets, [year]: newTargets };
        const success = await handleSaveAll(availableYears, records, nextTargets);
        if (success) {
          setTargets(nextTargets);
        }
        return success;
      };

      const handleRegisterYear = async (newYear) => {
        const yr = parseInt(newYear, 10);
        if (isNaN(yr) || yr < 1000 || yr > 9999) {
          alert('올바른 4자리 연도를 입력해주세요 (예: 2027).');
          return false;
        }

        if (availableYears.includes(yr)) {
          alert('이미 등록된 연도입니다.');
          return false;
        }

        const nextYears = [...availableYears, yr].sort((a, b) => b - a);
        
        const newActualsForYear = Array.from({ length: 12 }, (_, i) => ({
          id: `${yr}-${(i + 1).toString().padStart(2, '0')}`,
          year: yr,
          month: i + 1,
          diesel: '',
          cityGas: '',
          electricity: '',
          water: '',
          revenue: '',
        }));
        const nextRecords = [...records, ...newActualsForYear];
        const nextTargets = { ...targets, [yr]: TARGETS_2026 };

        const success = await handleSaveAll(nextYears, nextRecords, nextTargets);
        if (success) {
          setAvailableYears(nextYears);
          setRecords(nextRecords);
          setTargets(nextTargets);
          return yr;
        }
        return false;
      };

      return (
        <div className="min-h-screen bg-[#FAF9F6] text-[#1C1A17] flex flex-col font-sans relative">
          {isLoading && (
            <div className="fixed inset-0 z-[9999] bg-[#FAF9F6]/85 backdrop-blur-sm flex flex-col items-center justify-center gap-4">
              <div className="animate-spin rounded-full h-12 w-12 border-4 border-[#1C1A17] border-t-transparent shadow-sm"></div>
              <div className="text-center space-y-1">
                <p className="text-sm font-bold text-[#1C1A17] font-sans">중앙 공유 데이터베이스 연결 중...</p>
                <p className="text-[10px] text-[#57534E] font-mono uppercase tracking-wider">Loading real-time data from Google Sheets</p>
              </div>
            </div>
          )}

          {/* Top Banner */}
          <div className="bg-[#1C1A17] border-b border-[#2C2A27] px-4 py-2.5 text-center text-xs text-[#E5E2D9] font-mono flex items-center justify-center gap-2 print:hidden">
            <span className="w-2 h-2 rounded-full bg-[#10B981] animate-pulse inline-block" />
            <span className="tracking-wide">ANNUAL REPORT: 2026년 대성스틸 국가 온실가스 의무 감축 로드맵 준수 실적 평가 가동 중</span>
          </div>

          {/* Header */}
          <header className="sticky top-0 z-50 bg-[#FAF9F6]/90 backdrop-blur-md border-b border-[#E5E2D9] px-4 sm:px-6 lg:px-8 py-5 print:hidden">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-4">
                <div className="w-11 h-11 bg-[#1C1A17] text-[#FAF9F6] flex items-center justify-center font-bold text-lg">DS</div>
                <div>
                  <div className="flex items-center gap-2">
                    <h1 className="text-xl font-bold tracking-tight text-[#1C1A17] font-display">(주)대성스틸 온실가스 인벤토리 시스템</h1>
                    <span className="text-[10px] bg-[#15803D]/10 text-[#15803D] border border-[#15803D]/20 px-2 py-0.5 font-semibold tracking-wider uppercase font-mono">CARBON INVENTORY</span>
                  </div>
                  <p className="text-[11px] text-[#57534E] font-mono uppercase tracking-wider mt-0.5">Greenhouse Gas Management Portal — 2026</p>
                </div>
              </div>

              {/* Navigation Tabs */}
              <nav className="flex bg-[#F2EFE9] p-1 border border-[#E5E2D9] gap-1 text-xs sm:text-sm font-medium">
                <button onClick={() => handleTabChange('dashboard')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 transition-all cursor-pointer ${activeTab === 'dashboard' ? 'bg-[#1C1A17] text-[#FAF9F6]' : 'text-[#57534E] hover:text-[#1C1A17]'}`}>대시보드</button>
                <button onClick={() => handleTabChange('entry')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 transition-all cursor-pointer ${activeTab === 'entry' ? 'bg-[#1C1A17] text-[#FAF9F6]' : 'text-[#57534E] hover:text-[#1C1A17]'}`}>실적 입력</button>
                <button onClick={() => handleTabChange('targets_tab')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 transition-all cursor-pointer ${activeTab === 'targets_tab' ? 'bg-[#1C1A17] text-[#FAF9F6]' : 'text-[#57534E] hover:text-[#1C1A17]'}`}>목표 설정</button>
                <button onClick={() => handleTabChange('roadmap')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 transition-all cursor-pointer ${activeTab === 'roadmap' ? 'bg-[#1C1A17] text-[#FAF9F6]' : 'text-[#57534E] hover:text-[#1C1A17]'}`}>로드맵 시뮬레이터</button>
              </nav>
            </div>
          </header>

          {/* Main content */}
          <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {activeTab === 'dashboard' && <Dashboard records={records} targets={targets} onSaveRecord={handleSaveRecord} onDeleteRecord={handleDeleteRecord} onSaveTargets={handleSaveTargets} onNavigateToEntry={() => handleTabChange('entry')} onRefresh={loadData} availableYears={availableYears} />}
            {activeTab === 'entry' && <DataEntry records={records} onSaveRecords={handleSaveRecords} onDeleteRecord={handleDeleteRecord} targets={targets} onSaveTargets={handleSaveTargets} onRefresh={loadData} availableYears={availableYears} onRegisterYear={handleRegisterYear} isSaving={isSaving} />}
            {activeTab === 'targets_tab' && <TargetSetting targets={targets} onSaveTargets={handleSaveTargets} records={records} onRefresh={loadData} availableYears={availableYears} onRegisterYear={handleRegisterYear} isSaving={isSaving} />}
            {activeTab === 'roadmap' && <Roadmap records={records} />}
          </main>

          {/* Footer */}
          <footer className="bg-[#F5F2EB] border-t border-[#E5E2D9] py-8 px-4 text-center text-xs text-[#57534E] font-mono mt-12 print:hidden">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
              <p>✔ 본 시스템은 대한민국 환경부 온실가스 배출 계수 검증 표준에 따라 완벽하게 준수 제작되었습니다.</p>
              <p>© 2026 (주)대성스틸 안전환경본부. All rights reserved.</p>
            </div>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
